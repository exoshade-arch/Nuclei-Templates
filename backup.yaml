id: exposed-backup-files

info:
  name: Exposed Backup / Config / DB Files
  author: ExoShade
  severity: high
  tags: backup,exposure,config,fileread

http:
  - method: GET
    path:
      - "{{BaseURL}}/backup.zip"
      - "{{BaseURL}}/backup.tar.gz"
      - "{{BaseURL}}/site.zip"
      - "{{BaseURL}}/www.zip"
      - "{{BaseURL}}/backup.sql"
      - "{{BaseURL}}/db.sql"
      - "{{BaseURL}}/database.sql"
      - "{{BaseURL}}/dump.sql"
      - "{{BaseURL}}/config.bak"
      - "{{BaseURL}}/.env"
      - "{{BaseURL}}/wp-config.php.bak"
      - "{{BaseURL}}/backup.bak"

    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: header
        words:
          - "application/zip"
          - "application/x-gzip"
          - "application/sql"
          - "text/plain"
          - "application/octet-stream"
        condition: or

      - type: word
        part: body
        words:
          - "mysqldump"
          - "CREATE TABLE"
          - "INSERT INTO"
          - "DB_PASSWORD"
          - "DB_USER"
          - "APP_KEY="
        condition: or # Ovde je bilo "negative: true", sada je ispravljeno da traži ove reči

      - type: dsl
        dsl:
          - "len(body) > 100"